services:
  checkout-service:
    build:
      context: ./services/checkout-service
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: checkout
      DB_USER: checkout
      DB_PASSWORD: checkout
      DB_POOL_SIZE: 2
      DB_POOL_ACQUIRE_TIMEOUT_MS: 3000
      SIMULATED_DB_WORK_MS: 800
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkout
      POSTGRES_USER: checkout
      POSTGRES_PASSWORD: checkout
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkout -d checkout"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
